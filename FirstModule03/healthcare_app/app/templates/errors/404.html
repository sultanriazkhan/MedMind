<!-- templates/errors/404.html -->
{% extends "layouts/base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="text-center">
        <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-600 rounded-3xl shadow-lg mb-6">
            <i class="bi bi-question-circle text-white text-5xl"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 dark:text-white mb-4">404</h1>
        <h2 class="text-2xl font-semibold text-gray-700 dark:text-gray-300 mb-4">Page Not Found</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-8">The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('dashboard.dashboard_home') if current_user.is_authenticated else url_for('auth.login') }}" 
           class="inline-flex items-center px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all">
            <i class="bi bi-house-door mr-2"></i>
            Go Back Home
        </a>
    </div>
</div>
{% endblock %}
